<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{{ title }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/yl_host/static/css/style.css" />
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom fixed-top px-3">
        <div class="container-fluid d-flex justify-content-between align-items-center">

            <div class="navbar-left">
                {% if current_user.is_authenticated %}
                    <a class="navbar-brand d-flex align-items-center gap-2" href="/yl_host/user/{{ current_user.username }}">
                        <img src="/yl_host/static/img/pfp/{{ current_user.username }}" class="rounded-circle nav-avatar">
                        <span class="fw-semibold text-dark">{{ current_user.name }}</span>
                    </a>
                {% endif %}
            </div>

            <div class="navbar-right d-flex align-items-center gap-2">
                {% if current_user.is_authenticated %}
                    <a href="/yl_host/create_subreddit" class="btn btn-success btn-sm px-3 rounded-pill">
                        + Create subreddit
                    </a>
                {% else %}
                    <a class="btn btn-outline-primary btn-sm px-3 rounded-pill" href="/yl_host/register">Register</a>
                    <a class="btn btn-success btn-sm px-3 rounded-pill" href="/yl_host/login">Log in</a>
                {% endif %}
            </div>

        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
